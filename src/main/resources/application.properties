spring.application.name=cheermanager
server.port=8081

# Configuración de la base de datos
# En local sin variables de entorno definidas, usa estos valores por defecto.
# En producción, SIEMPRE define DB_URL, DB_USERNAME y DB_PASSWORD como variables de entorno.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cheermanager}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# Configuración de JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
 
# Configuración de MongoDB
#spring.data.mongodb.host=localhost
#spring.data.mongodb.port=27017
#spring.data.mongodb.database=cheermanager_documents
#spring.data.mongodb.uri=mongodb://localhost:27017/cheermanager
#spring.data.mongodb.auto-index-creation=true

# Configuración GridFS para archivos grandes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Propiedades de la aplicación
app.documents.upload-dir=./uploads

# JWT
# IMPORTANTE: jwt.secret SIEMPRE debe venir de una variable de entorno en cualquier
# entorno que no sea tu máquina local. El valor por defecto de abajo es solo para
# que el proyecto arranque en desarrollo sin configuración adicional.
# Genera uno nuevo y rótalo (no reuses el que estaba hardcodeado antes) con:
#   openssl rand -base64 64
jwt.secret=${JWT_SECRET:eUewg7BMQn0CXJyQyKgysZHMmARSUMYePKnEdnymutw/NW1td41vl7EFS/j5nJIlCTMX7dwZuBirOBwJlhZlBQ==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
 

# Authentication Configuration (24 horas = 1440 minutos)
auth.max-login-attempts=${AUTH_MAX_LOGIN_ATTEMPTS:5}
auth.lock-duration-minutes=${AUTH_LOCK_DURATION_MINUTES:30}
auth.reset-password-token-expiration-minutes=${AUTH_RESET_TOKEN_EXPIRATION_MINUTES:15}

